<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1A1A1A">
<title>Monte Castelo · Manutenção</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #1A1A1A;
  --bg-2: #222222;
  --bg-3: #2B2B2B;
  --concrete: #3A3A3A;
  --steel: #4F4F4F;
  --paper: #F5F2EC;
  --ink: #ECEAE5;
  --ink-mute: #8A8680;
  --ink-faint: #5A5650;
  --line: rgba(255, 255, 255, 0.08);
  --line-2: rgba(255, 255, 255, 0.14);
  --orange: #F26B1F;
  --orange-soft: #B84F15;
  --yellow: #E8B923;
  --green: #4A8B5C;
  --red: #C13F3F;
  --blue: #5687A8;
  --display: 'Archivo Black', sans-serif;
  --sans: 'Archivo', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-weight: 400;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  opacity: 0.04;
  pointer-events: none;
  z-index: 1;
  mix-blend-mode: overlay;
}

main { position: relative; z-index: 2; padding-bottom: 96px; }

.home-view { display: block; }
body.kanban-mode .home-view { display: none; }
body.kanban-mode .fab { display: none; }


header {
  background: var(--bg);
  border-bottom: 2px solid var(--ink);
  position: sticky; top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.header-stripe {
  height: 6px;
  background: repeating-linear-gradient(
    -45deg,
    var(--orange) 0 14px,
    var(--bg) 14px 28px
  );
}

.header-main {
  padding: 18px 22px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.brand-mark { display: flex; align-items: center; gap: 10px; }
.brand-logo {
  width: 36px; height: 36px;
  border: 2px solid var(--ink);
  display: grid; place-items: center;
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: -0.05em;
}
.brand-name {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  line-height: 1;
}
.brand-sub {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--ink-mute);
  text-transform: uppercase;
  margin-top: 4px;
}

.user-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
}
.user-avatar {
  width: 26px; height: 26px;
  background: var(--orange);
  display: grid; place-items: center;
  font-family: var(--display);
  font-size: 12px;
  color: var(--bg);
}
.user-info {
  display: flex; flex-direction: column;
  font-size: 11px;
  font-family: var(--mono);
  letter-spacing: 0.05em;
  line-height: 1.2;
}
.user-info span:first-child {
  color: var(--ink-mute);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.greeting-block { padding: 18px 22px 22px; }
.greeting-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.greeting-meta .live {
  color: var(--orange);
  display: flex; align-items: center; gap: 6px;
}
.live-dot {
  width: 6px; height: 6px;
  background: var(--orange);
  border-radius: 50%;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.3); }
}
.greeting-text {
  font-family: var(--display);
  font-size: 30px;
  line-height: 1;
  letter-spacing: -0.03em;
  text-transform: uppercase;
}
.greeting-text .accent { color: var(--orange); }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
}
.stat {
  padding: 14px 10px;
  border-right: 1px solid var(--line);
  text-align: left;
  cursor: pointer;
  transition: background 0.15s;
}
.stat:last-child { border-right: none; }
.stat:hover { background: var(--bg-3); }
.stat-num {
  font-family: var(--display);
  font-size: 28px;
  line-height: 1;
  letter-spacing: -0.03em;
}
.stat-num.crit { color: var(--red); }
.stat-num.warn { color: var(--yellow); }
.stat-num.ok { color: var(--green); }
.stat-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-top: 6px;
  line-height: 1.3;
}

.tabs-wrap {
  position: sticky;
  top: 76px;
  z-index: 50;
  background: var(--bg);
  border-bottom: 1px solid var(--line-2);
}
.tabs {
  display: flex;
  padding: 0 22px;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  background: none; border: none;
  padding: 14px 14px;
  color: var(--ink-mute);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  font-weight: 500;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); }
.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 14px; right: 14px;
  height: 2px;
  background: var(--orange);
}
.tab-count {
  display: inline-block;
  margin-left: 6px;
  background: var(--bg-3);
  padding: 2px 6px;
  font-size: 9px;
  border-radius: 2px;
}
.tab.active .tab-count { background: var(--orange); color: var(--bg); }

.filter-bar {
  display: flex;
  gap: 8px;
  padding: 14px 22px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--line);
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 7px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  cursor: pointer;
}
.chip:hover { color: var(--ink); border-color: var(--steel); }
.chip.active {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}

.orders { padding: 0; }
.order {
  border-bottom: 1px solid var(--line);
  padding: 18px 22px 18px 26px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.order::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--steel);
}
.order.crit::before { background: var(--red); }
.order.high::before { background: var(--orange); }
.order.med::before { background: var(--yellow); }
.order.low::before { background: var(--blue); }
.order.done::before { background: var(--green); }
.order:hover { background: var(--bg-2); }

.order-body { min-width: 0; }
.order-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.order-id {
  color: var(--ink);
  background: var(--bg-3);
  padding: 2px 6px;
  letter-spacing: 0.1em;
}
.priority-tag {
  padding: 2px 8px;
  font-weight: 600;
}
.priority-tag.crit { background: var(--red); color: var(--paper); }
.priority-tag.high { background: var(--orange); color: var(--bg); }
.priority-tag.med { background: var(--yellow); color: var(--bg); }
.priority-tag.low { background: var(--blue); color: var(--paper); }
.priority-tag.done { background: var(--green); color: var(--paper); }

.order-title {
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.order.done .order-title {
  text-decoration: line-through;
  color: var(--ink-mute);
}

.order-info {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  font-size: 12px;
  color: var(--ink-mute);
}
.order-info span {
  display: flex; align-items: center; gap: 5px;
}
.order-info svg { width: 12px; height: 12px; flex-shrink: 0; }

.order-deadline {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  text-align: right;
  gap: 4px;
}
.deadline-time {
  font-family: var(--display);
  font-size: 18px;
  line-height: 1;
  letter-spacing: -0.02em;
}
.deadline-label {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.order.crit .deadline-time { color: var(--red); }
.order.high .deadline-time { color: var(--orange); }
.order.done .deadline-time { color: var(--green); }

.fab {
  position: fixed;
  bottom: 80px;
  right: 22px;
  width: 56px; height: 56px;
  background: var(--orange);
  border: none;
  border-radius: 50%;
  color: var(--bg);
  font-size: 30px;
  font-weight: 300;
  cursor: pointer;
  z-index: 90;
  box-shadow: 0 10px 30px rgba(242, 107, 31, 0.4),
              0 4px 8px rgba(0, 0, 0, 0.3);
  transition: transform 0.2s;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.fab:hover { transform: translateY(-2px) rotate(90deg); }
.fab:active { transform: scale(0.95); }

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg);
  border-top: 2px solid var(--ink);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  z-index: 80;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  background: none; border: none;
  padding: 12px 8px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  color: var(--ink-mute);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative;
}
.nav-item.active { color: var(--orange); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 25%; right: 25%;
  height: 2px;
  background: var(--orange);
}
.nav-item svg { width: 22px; height: 22px; }

.empty {
  padding: 60px 22px;
  text-align: center;
  color: var(--ink-mute);
}
.empty-icon {
  width: 56px; height: 56px;
  margin: 0 auto 18px;
  border: 2px solid var(--line-2);
  display: grid; place-items: center;
}
.empty h3 {
  font-family: var(--display);
  font-size: 18px;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.empty p { font-size: 13px; max-width: 260px; margin: 0 auto; line-height: 1.5; }

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--bg);
  width: 100%;
  max-width: 560px;
  max-height: 92vh;
  overflow-y: auto;
  border-top: 2px solid var(--orange);
  animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.modal-title {
  font-family: var(--display);
  font-size: 16px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  line-height: 1.3;
}
.modal-close {
  background: none; border: none;
  color: var(--ink-mute);
  font-size: 22px;
  cursor: pointer;
  width: 32px; height: 32px;
  flex-shrink: 0;
  display: grid; place-items: center;
}
.modal-close:hover { color: var(--ink); }

.modal-body { padding: 22px; }

.field { margin-bottom: 18px; }
.field-label {
  display: block;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-bottom: 2px solid var(--steel);
  color: var(--ink);
  padding: 12px 14px;
  font-family: var(--sans);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-bottom-color: var(--orange);
}
.field textarea { resize: vertical; min-height: 80px; font-family: var(--sans); }
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.priority-group {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.priority-opt {
  padding: 10px 6px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  cursor: pointer;
  text-align: center;
}
.priority-opt:hover { color: var(--ink); }
.priority-opt.sel.crit { background: var(--red); color: var(--paper); border-color: var(--red); }
.priority-opt.sel.high { background: var(--orange); color: var(--bg); border-color: var(--orange); }
.priority-opt.sel.med { background: var(--yellow); color: var(--bg); border-color: var(--yellow); }
.priority-opt.sel.low { background: var(--blue); color: var(--paper); border-color: var(--blue); }

.btn-row { display: flex; gap: 10px; margin-top: 24px; }
.btn {
  flex: 1;
  padding: 14px 18px;
  border: none;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-primary { background: var(--orange); color: var(--bg); }
.btn-primary:hover { background: var(--orange-soft); color: var(--paper); }
.btn-secondary {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line-2);
}
.btn-secondary:hover { border-color: var(--ink); }

.detail-section {
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
}
.detail-section:last-child { border-bottom: none; }
.detail-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}
.detail-value { font-size: 14px; line-height: 1.5; }
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.status-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.status-btn {
  padding: 12px 6px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink);
  cursor: pointer;
  text-align: center;
}
.status-btn:hover { background: var(--bg-3); }
.status-btn.done { background: var(--green); border-color: var(--green); color: var(--paper); }
.status-btn.done:hover { background: #5BA371; }

.timeline {
  padding-left: 16px;
  border-left: 1px dashed var(--line-2);
}
.timeline-item {
  position: relative;
  padding-bottom: 14px;
  font-size: 13px;
}
.timeline-item:last-child { padding-bottom: 0; }
.timeline-item::before {
  content: '';
  position: absolute;
  left: -20px; top: 6px;
  width: 8px; height: 8px;
  background: var(--orange);
  border: 2px solid var(--bg);
  border-radius: 50%;
}
.timeline-time {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 2px;
}

.photo-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.photo-add {
  width: 64px; height: 64px;
  background: var(--bg-2);
  border: 1px dashed var(--line-2);
  display: grid; place-items: center;
  cursor: pointer;
  color: var(--ink-mute);
}
.photo-add:hover { border-color: var(--orange); color: var(--orange); }
.photo-thumb {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--concrete), var(--steel));
  display: grid; place-items: center;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink-mute);
  letter-spacing: 0.15em;
}

.comment {
  background: var(--bg-2);
  border-left: 2px solid var(--orange);
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 13px;
}
.comment-meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 4px;
}
.comment-input {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.comment-input input {
  flex: 1;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  color: var(--ink);
  padding: 10px 12px;
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
}
.comment-input button {
  background: var(--ink);
  color: var(--bg);
  border: none;
  padding: 0 16px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-weight: 600;
  cursor: pointer;
}


.checklist {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.checklist-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 10px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  font-size: 13px;
  line-height: 1.4;
}
.checklist-box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--steel);
  flex-shrink: 0;
  margin-top: 1px;
  display: grid; place-items: center;
  cursor: pointer;
  transition: all 0.15s;
}
.checklist-item.done .checklist-box {
  background: var(--green);
  border-color: var(--green);
}
.checklist-item.done .checklist-box::after {
  content: '✓';
  color: var(--paper);
  font-size: 12px;
  font-weight: 600;
  line-height: 1;
}
.checklist-item.done .checklist-text {
  text-decoration: line-through;
  color: var(--ink-mute);
}
.checklist-text { flex: 1; }
.checklist-progress {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 8px;
}


/* ============ KANBAN VIEW ============ */
.kanban-view {
  display: none;
  padding: 0;
}
.kanban-view.active { display: block; }

.kanban-toolbar {
  padding: 16px 22px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 40;
}
.kanban-title-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}
.kanban-title {
  font-family: var(--display);
  font-size: 22px;
  letter-spacing: -0.02em;
  text-transform: uppercase;
}
.kanban-title-meta {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.kanban-search-row {
  position: relative;
  margin-bottom: 12px;
}
.kanban-search-row input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-bottom: 2px solid var(--steel);
  color: var(--ink);
  padding: 10px 14px 10px 36px;
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
}
.kanban-search-row svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--ink-mute);
}
.kanban-bucket-chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.kanban-bucket-chips::-webkit-scrollbar { display: none; }

.kanban-board {
  display: grid;
  grid-template-columns: repeat(3, minmax(280px, 1fr));
  gap: 14px;
  padding: 18px 22px 32px;
  overflow-x: auto;
  min-height: calc(100vh - 280px);
}

.kanban-col {
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  display: flex;
  flex-direction: column;
  min-width: 280px;
  max-height: calc(100vh - 280px);
}

.kanban-col-head {
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--line-2);
  position: sticky;
  top: 0;
  background: var(--bg-2);
  z-index: 5;
}
.kanban-col-name {
  font-family: var(--display);
  font-size: 13px;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}
.kanban-col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.kanban-col-dot.open { background: var(--yellow); }
.kanban-col-dot.progress { background: var(--orange); }
.kanban-col-dot.done { background: var(--green); }
.kanban-col-count {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--ink-mute);
  text-transform: uppercase;
  margin-top: 4px;
}

.kanban-col-body {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
  min-height: 100px;
}

.kanban-card {
  background: var(--bg);
  border: 1px solid var(--line-2);
  padding: 10px 12px;
  margin-bottom: 8px;
  cursor: grab;
  position: relative;
  transition: border-color 0.15s, transform 0.15s;
}
.kanban-card:hover {
  border-color: var(--steel);
}
.kanban-card.dragging {
  opacity: 0.4;
  cursor: grabbing;
}
.kanban-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--steel);
}
.kanban-card.crit::before { background: var(--red); }
.kanban-card.high::before { background: var(--orange); }
.kanban-card.med::before { background: var(--yellow); }
.kanban-card.low::before { background: var(--blue); }
.kanban-card.done::before { background: var(--green); }

.kanban-card-meta {
  display: flex;
  gap: 6px;
  align-items: center;
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 6px;
  margin-left: 8px;
  flex-wrap: wrap;
}
.kanban-card-id {
  background: var(--bg-3);
  padding: 1px 5px;
  color: var(--ink);
}
.kanban-card-prio {
  padding: 1px 5px;
  font-weight: 600;
}
.kanban-card-prio.crit { background: var(--red); color: var(--paper); }
.kanban-card-prio.high { background: var(--orange); color: var(--bg); }
.kanban-card-prio.med { background: var(--yellow); color: var(--bg); }
.kanban-card-prio.low { background: var(--blue); color: var(--paper); }
.kanban-card-prio.done { background: var(--green); color: var(--paper); }

.kanban-card-title {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
  margin-bottom: 8px;
  margin-left: 8px;
}
.kanban-card.done .kanban-card-title {
  text-decoration: line-through;
  color: var(--ink-mute);
}
.kanban-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-left: 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-mute);
  gap: 8px;
}
.kanban-card-bucket { font-weight: 500; }
.kanban-card-assignee {
  text-align: right;
  max-width: 50%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.kanban-col.drag-over {
  background: var(--bg-3);
  border-color: var(--orange);
}

.kanban-empty {
  padding: 40px 12px;
  text-align: center;
  color: var(--ink-faint);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.kanban-load-more {
  margin: 8px 0 4px;
  width: 100%;
  padding: 8px;
  background: var(--bg-2);
  border: 1px dashed var(--line-2);
  color: var(--ink-mute);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
}
.kanban-load-more:hover { color: var(--ink); border-color: var(--steel); }

@media (max-width: 768px) {
  .kanban-board {
    grid-template-columns: repeat(3, 86vw);
    gap: 10px;
    padding: 14px;
    scroll-snap-type: x mandatory;
  }
  .kanban-col {
    scroll-snap-align: start;
    max-height: calc(100vh - 280px);
  }
}


.assignee-edit {

.assignee-current {

.assignee-edit-btn {

.assignee-edit-btn:hover {

.assignee-save-btn {

<script>
const today = new Date();
const fmtTime = (d) => {
  const dt = new Date(d);
  const days = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
  const months = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];

function escapeId(id) {
  return id.replace(/[^a-zA-Z0-9]/g, '_');
}

function bindAssigneeEditor(orderId) {
  const safeId = escapeId(orderId);
  const editBtn = document.querySelector('[data-edit-assignee="' + orderId + '"]');
  const saveBtn = document.querySelector('[data-save-assignee="' + orderId + '"]');
  const input = document.querySelector('[data-assignee-input="' + orderId + '"]');
  const suggBox = document.querySelector('[data-suggestions="' + orderId + '"]');
  const viewBlock = document.getElementById('assigneeView_' + safeId);
  const editBlock = document.getElementById('assigneeEdit_' + safeId);

  if (!editBtn || !saveBtn || !input) return;

  editBtn.addEventListener('click', () => {
    viewBlock.style.display = 'none';
    editBlock.style.display = 'block';
    input.focus();
    input.select();
    showSuggestions(input.value, orderId);
  });

  input.addEventListener('input', () => {
    showSuggestions(input.value, orderId);
  });
  input.addEventListener('focus', () => {
    showSuggestions(input.value, orderId);
  });
  input.addEventListener('blur', () => {
    setTimeout(() => { suggBox.classList.remove('open'); }, 200);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      saveAssignee(orderId);
    } else if (e.key === 'Escape') {
      viewBlock.style.display = 'flex';
      editBlock.style.display = 'none';
      suggBox.classList.remove('open');
    }
  });

  saveBtn.addEventListener('click', () => saveAssignee(orderId));
}

function showSuggestions(query, orderId) {
  const suggBox = document.querySelector('[data-suggestions="' + orderId + '"]');
  if (!suggBox) return;
  const q = (query || '').toLowerCase().trim();
  const matches = RESPONSAVEIS.filter(r => r.toLowerCase().includes(q));

  let html = '';
  if (matches.length) {
    html += matches.slice(0, 8).map(r => 
      '<div class="assignee-suggestion" data-pick="' + r.replace(/"/g, '&quot;') + '" data-order="' + orderId + '">' + r + '</div>'
    ).join('');
  }
  if (q && !RESPONSAVEIS.some(r => r.toLowerCase() === q)) {
    html += '<div class="assignee-suggestion add-new" data-pick="' + query.replace(/"/g, '&quot;') + '" data-order="' + orderId + '" data-isnew="1">+ Adicionar "' + query + '"</div>';
  }

  if (!html) {
    suggBox.classList.remove('open');
    return;
  }

  suggBox.innerHTML = html;
  suggBox.classList.add('open');

  suggBox.querySelectorAll('.assignee-suggestion').forEach(el => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const input = document.querySelector('[data-assignee-input="' + orderId + '"]');
      input.value = el.dataset.pick;
      if (el.dataset.isnew === '1' && !RESPONSAVEIS.includes(el.dataset.pick)) {
        RESPONSAVEIS.unshift(el.dataset.pick);
      }
      saveAssignee(orderId);
    });
  });
}

function saveAssignee(orderId) {
  const input = document.querySelector('[data-assignee-input="' + orderId + '"]');
  if (!input) return;
  const newName = input.value.trim() || 'Não atribuído';
  const o = orders.find(x => x.id === orderId);
  if (!o) return;

  if (o.assignee === newName) {
    const safeId = escapeId(orderId);
    document.getElementById('assigneeView_' + safeId).style.display = 'flex';
    document.getElementById('assigneeEdit_' + safeId).style.display = 'none';
    return;
  }

  const oldName = o.assignee;
  o.assignee = newName;
  o.timeline.push({
    time: 'Agora',
    text: 'Responsável alterado de "' + oldName + '" para "' + newName + '"'
  });

  if (newName !== 'Não atribuído' && !RESPONSAVEIS.includes(newName)) {
    RESPONSAVEIS.unshift(newName);
  }

  openDetail(orderId);
  render();
  if (document.body.classList.contains('kanban-mode')) {
    renderKanban();
  }
}


function priorityLabel(p) {
  return { crit: 'CRÍT', high: 'ALTA', med: 'MÉDIA', low: 'BAIXA' }[p] || p.toUpperCase();
}
function typeLabel(t) {
  return { os: 'OS', task: 'TAREFA', prev: 'PREVENTIVA' }[t] || t;
}
function statusLabel(s) {
  return { open: 'Em aberto', progress: 'Em execução', done: 'Concluída' }[s] || s;
}
function deadlineDisplay(d, status) {
  if (status === 'done') return { time: '✓', label: 'Feito' };
  const diff = new Date(d) - new Date();
  const h = Math.floor(diff / (1000*60*60));
  const days = Math.floor(h / 24);
  if (diff < 0) return { time: 'ATRASO', label: `${Math.abs(h)}h` };
  if (h < 1) return { time: `${Math.max(0, Math.floor(diff/60000))}m`, label: 'Faltam' };
  if (h < 24) return { time: `${h}h`, label: 'Faltam' };
  return { time: `${days}d`, label: 'Faltam' };
}

function filterOrders() {
  const q = (state.search || '').toLowerCase().trim();
  return orders.filter(o => {
    // tab
    if (state.tab === 'os' && o.type !== 'os') return false;
    if (state.tab === 'task' && o.type !== 'task') return false;
    if (state.tab === 'prev' && o.type !== 'prev') return false;
    if (state.tab === 'done' && o.status !== 'done') return false;
    if (state.tab !== 'done' && state.tab !== 'all' && o.status === 'done') return false;
    if (state.tab === 'all' && o.status === 'done') return false;
    // filter status
    if (state.filter === 'open' && o.status !== 'open') return false;
    if (state.filter === 'progress' && o.status !== 'progress') return false;
    if (state.filter === 'crit' && o.priority !== 'crit') return false;
    if (state.filter === 'high' && o.priority !== 'high') return false;
    if (state.filter === 'minhas' && !(o.assignee.includes('Miguel') || o.assignee === 'Não atribuído')) return false;
    if (state.filter === 'hoje') {
      const same = new Date(o.deadline).toDateString() === new Date().toDateString();
      if (!same) return false;
    }
    if (state.filter === 'atraso') {
      if (new Date(o.deadline) >= new Date() || o.status === 'done') return false;
    }
    // bucket
    if (state.bucket && o.local !== state.bucket) return false;
    // search
    if (q) {
      const haystack = (o.title + ' ' + o.local + ' ' + o.assignee + ' ' + o.id + ' ' + (o.desc || '')).toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

  document.getElementById('cAll').textContent = orders.filter(o=>o.status!=='done').length;
  document.getElementById('cOs').textContent = orders.filter(o=>o.type==='os' && o.status!=='done').length;
  document.getElementById('cTask').textContent = orders.filter(o=>o.type==='task' && o.status!=='done').length;
  document.getElementById('cPrev').textContent = orders.filter(o=>o.type==='prev' && o.status!=='done').length;
  document.getElementById('cDone').textContent = orders.filter(o=>o.status==='done').length;

  const open = orders.filter(o=>o.status!=='done');
  // Concluídas da última semana
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
  const recentDone = orders.filter(o=>o.status==='done' && o.createdAt && new Date(o.createdAt) >= weekAgo).length;

  document.getElementById('statOpen').textContent = open.length;
  document.getElementById('statProg').textContent = orders.filter(o=>o.status==='progress').length;
  document.getElementById('statDone').textContent = recentDone;
  document.getElementById('greetingCount').textContent = open.length;

  const list = document.getElementById('ordersList');

          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <h3>Nada por aqui</h3>
        <p>Nenhuma demanda corresponde aos filtros selecionados.</p>
      </div>`;
    return;
  }

  // Paginação: mostrar 60 por padrão, botão "carregar mais"
  const PAGE_SIZE = 60;
  if (!state.shown) state.shown = PAGE_SIZE;
  const visibleItems = filtered.slice(0, state.shown);
  const hasMore = filtered.length > state.shown;

  list.innerHTML = visibleItems.map(o => {
    const dl = deadlineDisplay(o.deadline, o.status);
    const cls = o.status === 'done' ? 'done' : o.priority;
    return `
      <div class="order ${cls}" data-id="${o.id}">
        <div class="order-body">
          <div class="order-meta">
            <span class="order-id">${o.id}</span>
            <span class="priority-tag ${cls}">${o.status === 'done' ? 'OK' : priorityLabel(o.priority)}</span>
            <span>${typeLabel(o.type)}</span>
            ${o.status === 'progress' ? '<span style="color: var(--orange);">● EM EXECUÇÃO</span>' : ''}
          </div>
          <div class="order-title">${o.title}</div>
          <div class="order-info">
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              ${o.local}
            </span>
            <span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
              ${o.assignee}
            </span>
          </div>
        </div>
        <div class="order-deadline">
          <div class="deadline-time">${dl.time}</div>
          <div class="deadline-label">${dl.label}</div>
        </div>
      </div>
    `;
  }).join('');

  if (hasMore) {
    list.innerHTML += `
      <div style="padding: 24px 22px; text-align: center; border-bottom: 1px solid var(--line);">
        <button id="loadMore" style="background: var(--bg-2); border: 1px solid var(--line-2); color: var(--ink); padding: 12px 24px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;">
          Carregar mais (${filtered.length - state.shown} restantes)
        </button>
        <div style="font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--ink-mute); margin-top: 10px; text-transform: uppercase;">
          Mostrando ${state.shown} de ${filtered.length}
        </div>
      </div>`;
    document.getElementById('loadMore').addEventListener('click', () => {
      state.shown += PAGE_SIZE;
      render();
    });
  } else if (filtered.length > PAGE_SIZE) {
    list.innerHTML += `
      <div style="padding: 18px 22px; text-align: center; font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; color: var(--ink-mute); text-transform: uppercase;">
        — Total: ${filtered.length} demandas —
      </div>`;
  }

  list.querySelectorAll('.order').forEach(el => {
    el.addEventListener('click', () => openDetail(el.dataset.id));
  });
  // Se kanban está ativo, atualiza ele também
  if (document.body.classList.contains('kanban-mode')) {
    renderKanban();
  }
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.tab = t.dataset.tab;
    state.shown = 60;
    render();
  });
});
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    if (c.dataset.bucket) {
      state.filter = 'all';
      state.bucket = c.dataset.bucket;
    } else {
      state.filter = c.dataset.filter;
      state.bucket = null;

// Busca
const searchInput = document.getElementById('searchInput');
let searchDebounce;
searchInput.addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.search = e.target.value;
    state.shown = 60;
    render();
  }, 200);
});

// Stats clicáveis
document.querySelectorAll('.stat[data-stat-filter]').forEach(s => {
  s.addEventListener('click', () => {
    const f = s.dataset.statFilter;
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    if (f === 'done') {
      document.querySelector('.tab[data-tab="done"]').classList.add('active');
      state.tab = 'done';
      state.filter = 'all';
      document.querySelector('.chip[data-filter="all"]').classList.add('active');
    } else if (f === 'crit') {
      document.querySelector('.tab[data-tab="all"]').classList.add('active');
      state.tab = 'all';
      state.filter = 'crit';
      document.querySelector('.chip[data-filter="crit"]').classList.add('active');
    } else {
      document.querySelector('.tab[data-tab="all"]').classList.add('active');
      state.tab = 'all';
      state.filter = 'all';
      document.querySelector('.chip[data-filter="all"]').classList.add('active');
    }
    render();
    window.scrollTo({ top: 200, behavior: 'smooth' });
  });
});

document.querySelectorAll('#prioGroup .priority-opt').forEach(p => {

document.getElementById('saveNew').addEventListener('click', () => {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) {
    document.getElementById('newTitle').focus();
    return;
  }
  const type = document.getElementById('newType').value;
  const prefix = type === 'os' ? 'OS' : type === 'task' ? 'TF' : 'PV';
  const newId = `${prefix}-${String(Math.floor(Math.random()*9000)+1000)}`;
  const dlInput = document.getElementById('newDeadline').value;

  orders.unshift({
    id: newId, type, title,
    priority: selPrio, status: 'open',
    local: document.getElementById('newLocal').value || 'A definir',
    assignee: document.getElementById('newAssign').value,
    deadline: dlInput ? new Date(dlInput) : new Date(Date.now() + 24*60*60*1000),
    desc: document.getElementById('newDesc').value || '—',
    timeline: [{ time: 'Agora', text: 'Demanda criada por Miguel K.' }],

const modalDetail = document.getElementById('modalDetail');
function openDetail(id) {

  const dl = deadlineDisplay(o.deadline, o.status);

          ${o.id} · ${typeLabel(o.type)}
        </div>
        <div class="modal-title">${o.title}</div>
      </div>
      <button class="modal-close" data-close>✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 4px;">
        <span class="priority-tag ${cls}" style="font-family:var(--mono); font-size:10px; letter-spacing:0.2em;">${o.status === 'done' ? 'CONCLUÍDA' : priorityLabel(o.priority)}</span>
        <span style="padding: 2px 8px; background: var(--bg-2); border: 1px solid var(--line-2); font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: ${o.status==='progress' ? 'var(--orange)' : 'var(--ink-mute)'};">${statusLabel(o.status)}</span>
      </div>

      <div class="detail-section">
        <div class="detail-grid">
          <div>
            <div class="detail-label">Local</div>
            <div class="detail-value">${o.local}</div>
          </div>
          <div>
            <div class="detail-label">Responsável</div>
            <div class="assignee-current" id="assigneeView_${o.id.replace(/[^a-zA-Z0-9]/g,'_')}">
              <span class="assignee-current-name">${o.assignee}</span>
              <button class="assignee-edit-btn" data-edit-assignee="${o.id}">Alterar</button>
            </div>
            <div class="assignee-edit" id="assigneeEdit_${o.id.replace(/[^a-zA-Z0-9]/g,'_')}" style="display:none;">
              <div class="assignee-input-wrap">

          </div>
          <div>

            <div class="detail-value">${fmtTime(o.deadline)}</div>
          </div>
          <div>
            <div class="detail-label">Restante</div>
            <div class="detail-value" style="font-family:var(--display); font-size:18px; color: ${o.status==='done' ? 'var(--green)' : (cls==='crit'?'var(--red)':'var(--orange)')};">${dl.time} ${dl.label !== 'Faltam' && dl.label !== 'Feito' ? '· ' + dl.label : ''}</div>

      </div>

      ${o.checklist && o.checklist.length ? `

modalDetail.addEventListener('click', (e) => {

/* ============ KANBAN ============ */
const kanbanState = { search: '', bucket: '', shownPerCol: { open: 100, progress: 100, done: 50 } };

function renderKanban() {
  const q = (kanbanState.search || '').toLowerCase().trim();
  const filtered = orders.filter(o => {
    if (kanbanState.bucket && o.local !== kanbanState.bucket) return false;
    if (q) {
      const hay = (o.title + ' ' + o.local + ' ' + o.assignee + ' ' + o.id + ' ' + (o.desc||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const byStatus = { open: [], progress: [], done: [] };
  filtered.forEach(o => {
    if (byStatus[o.status]) byStatus[o.status].push(o);
  });

  // Ordenar concluídas pela mais recente
  byStatus.done.sort((a,b) => {
    const da = a.createdAt ? new Date(a.createdAt).getTime() : 0;
    const db = b.createdAt ? new Date(b.createdAt).getTime() : 0;
    return db - da;
  });

  document.getElementById('kCountOpen').textContent = byStatus.open.length + ' cards';
  document.getElementById('kCountProg').textContent = byStatus.progress.length + ' cards';
  document.getElementById('kCountDone').textContent = byStatus.done.length + ' cards';
  document.getElementById('kanbanMeta').textContent = filtered.length + ' demandas no quadro';

  ['open', 'progress', 'done'].forEach(st => {
    const el = document.getElementById('kBody' + (st === 'open' ? 'Open' : st === 'progress' ? 'Prog' : 'Done'));
    const items = byStatus[st];
    const limit = kanbanState.shownPerCol[st];
    const visible = items.slice(0, limit);
    
    if (!items.length) {
      el.innerHTML = '<div class="kanban-empty">Sem demandas</div>';
      return;
    }
    
    el.innerHTML = visible.map(o => {
      const cls = o.status === 'done' ? 'done' : o.priority;
      const prioLabel = { crit: 'CRÍT', high: 'ALTA', med: 'MÉDIA', low: 'BAIXA' }[o.priority] || '';
      const typeLabel = { os: 'OS', task: 'TAREFA', prev: 'PREV' }[o.type] || '';
      return `
        <div class="kanban-card ${cls}" draggable="true" data-id="${o.id}">
          <div class="kanban-card-meta">
            <span class="kanban-card-id">${o.id}</span>
            <span class="kanban-card-prio ${cls}">${o.status === 'done' ? 'OK' : prioLabel}</span>
            <span>${typeLabel}</span>
          </div>
          <div class="kanban-card-title">${o.title}</div>
          <div class="kanban-card-footer">
            <span class="kanban-card-bucket">${o.local}</span>
            <span class="kanban-card-assignee">${o.assignee}</span>
          </div>
        </div>
      `;
    }).join('');
    
    if (items.length > limit) {
      el.innerHTML += `<button class="kanban-load-more" data-col="${st}">+ ${items.length - limit} restantes</button>`;
    }
  });

  // Bind cards
  document.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (!card.classList.contains('dragging')) {
        openDetail(card.dataset.id);
      }
    });
    card.addEventListener('dragstart', (e) => {
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
    });
  });

  // Bind load more
  document.querySelectorAll('.kanban-load-more').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      kanbanState.shownPerCol[btn.dataset.col] += 100;
      renderKanban();
    });
  });
}

// Drag & drop nas colunas
document.querySelectorAll('.kanban-col-body').forEach(body => {
  body.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    body.closest('.kanban-col').classList.add('drag-over');
  });
  body.addEventListener('dragleave', (e) => {
    if (!body.contains(e.relatedTarget)) {
      body.closest('.kanban-col').classList.remove('drag-over');
    }
  });
  body.addEventListener('drop', (e) => {
    e.preventDefault();
    body.closest('.kanban-col').classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/plain');
    const newStatus = body.dataset.drop;
    const o = orders.find(x => x.id === id);
    if (o && o.status !== newStatus) {
      const oldStatus = o.status;
      o.status = newStatus;
      const statusName = { open: 'Em aberto', progress: 'Em execução', done: 'Concluída' }[newStatus];
      o.timeline.push({
        time: 'Agora',
        text: `Status alterado para "${statusName}" via Kanban`
      });
      renderKanban();
      // Re-render home também
      render();
    }
  });
});

document.getElementById('kanbanSearch').addEventListener('input', (e) => {

document.querySelectorAll('#kanbanBucketChips .chip').forEach(c => {

// === Navegação entre views ===
function switchView(view) {
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  if (view === 'kanban') {
    document.body.classList.add('kanban-mode');
    document.getElementById('kanbanView').classList.add('active');
    document.getElementById('navKanban').classList.add('active');
    renderKanban();
    window.scrollTo({ top: 0, behavior: 'instant' });
  } else {
    document.body.classList.remove('kanban-mode');
    document.getElementById('kanbanView').classList.remove('active');
    document.getElementById('navHome').classList.add('active');
  }
}

document.getElementById('navKanban').addEventListener('click', () => switchView('kanban'));
document.getElementById('navHome').addEventListener('click', () => switchView('home'));


function updateClock() {
  document.getElementById('dateLine').textContent = fmtTime(new Date());
}
updateClock();
setInterval(updateClock, 60000);

render();
